# Example FEMTO runtime configuration.
#
# This file documents the active configs/system_config.yaml schema without changing
# the runtime schema. Copy values into configs/system_config.yaml or a local
# deployment config only after verifying paths, pins, duty cycles, and timing on
# the target Jetson hardware.

model:
  path: "path/to/best.engine"
  task: "detect"
  confidence_threshold: 0.50

decision:
  buffer_size: 10
  result_delay_seconds: 2.0
  allow_multiple_objects: false

shutdown:
  class_name: "shutdown_card"
  confidence_threshold: 0.70
  buffer_size: 40
  delay_seconds: 10.0
  sound_path: "path/to/shutdown_alert.mp3"

motion:
  enabled: true
  pixel_threshold: 1500
  yolo_awake_duration_seconds: 2.5
  frame_diff_threshold: 25
  blur_kernel_size: 21

camera:
  sensor_id: 0
  width: 1280
  height: 720
  flip_method: 0

audio:
  startup_alert: "path/to/start_alert.mp3"
  category_sounds:
    Recycle Waste: "path/to/recycle.mp3"
    General Waste: "path/to/general.mp3"
    Organic Waste: "path/to/organic.mp3"
    Hazardous Waste: "path/to/hazardous.mp3"

servo:
  rotate_pin: 32
  tilt_pin: 33
  pwm_frequency: 50

  start_position:
    rotate_duty: 7.5
    tilt_duty: 4.12

  category_positions:
    Recycle Waste:
      rotate_duty: 5.0
      tilt_duty: 7.5
    General Waste:
      rotate_duty: 10.5
      tilt_duty: 1.78
    Organic Waste:
      rotate_duty: 10.3
      tilt_duty: 7.5
    Hazardous Waste:
      rotate_duty: 5.0
      tilt_duty: 1.78

  timing:
    rotate_step_seconds: 0.3
    tilt_return_seconds: 1.3
    rotate_return_seconds: 1.7
    cycle_done_seconds: 2.0
    startup_delay_seconds: 0.5
    release_rotate_pwm: true

runtime:
  loop_sleep_seconds: 0.005
  camera_drop_sleep_seconds: 0.05
